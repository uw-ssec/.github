# Runs zizmor on every file in .github/workflow-templates/ to ensure all
# hardened templates remain clean before they are published to maintainers.
# Also scans any workflows in this .github repo itself.

name: Lint workflow templates

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflow-templates/**"
      - ".github/workflows/**"
      - "zizmor.yml"
  push:
    branches: [main]
    paths:
      - ".github/workflow-templates/**"
      - ".github/workflows/**"
      - "zizmor.yml"

permissions: {}

jobs:
  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Lint workflow templates
        uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e # v0.5.3
        with:
          # Scan both the starter templates and the workflows in this repo.
          inputs: .github/workflow-templates/ .github/workflows/
          min-severity: medium
          config: zizmor.yml
          # Use inline annotations (visible in PR diff) rather than SARIF upload.
          # To upload to the GitHub Security tab instead, remove these two lines
          # and add `security-events: write` to this job's permissions block.
          advanced-security: "false"
          annotations: "true"
